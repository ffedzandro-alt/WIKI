<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    .doc-dashboard {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
      max-width: 1400px;
      margin: 34px auto;
      font-family: Arial, Helvetica, sans-serif;
      color: #06264a;
    }
    .doc-panel, .doc-add-card {
      border: 1px solid #ccd6e2;
      border-radius: 6px;
      background: #fff;
    }
    .doc-panel h2 {
      margin: 0;
      padding: 18px 22px;
      border-bottom: 1px solid #ccd6e2;
      font-size: 22px;
      color: #002b55;
    }
    .doc-empty {
      padding: 20px 22px;
      margin: 0;
      color: #58677a;
      font-style: italic;
    }
    .doc-add-card {
      min-height: 300px;
      cursor: pointer;
      text-align: center;
      padding: 44px 28px;
      color: #002b55;
      border: none;
      transition: background 0.2s;
    }
    .doc-add-card:hover { background: #f5f8fc; }
    .doc-add-card span  { display: block; font-size: 96px; line-height: 1; font-weight: 700; }
    .doc-add-card strong{ display: block; font-size: 24px; margin: 12px 0 16px; }
    .doc-categories-panel { grid-column: 1 / -1; }
    .doc-category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 20px;
    }
    .doc-category-card {
      border: 1px solid #ccd6e2;
      border-radius: 6px;
      padding: 22px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .doc-category-card:hover { background: #f0f4f8; border-color: #07345f; }
    .doc-category-card span  { display: block; font-size: 34px; margin-bottom: 10px; }
    .doc-category-card strong,
    .doc-category-card small { display: block; }
    .doc-list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid #e3e8ef;
      transition: background 0.15s;
    }
    .doc-list-item:last-child { border-bottom: none; }
    .doc-list-item:hover      { background: #f5f7fa; }
    .doc-list-icon {
      width: 46px; height: 48px;
      border-radius: 5px;
      background: #07345f;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .doc-list-info           { flex: 1; min-width: 0; }
    .doc-list-info strong    { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-list-info small     { display: block; font-size: 12px; color: #58677a; margin-top: 2px; }
    .doc-list-actions        { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .doc-action-btn {
      background: none; border: none; cursor: pointer;
      font-size: 17px; padding: 4px 5px;
      border-radius: 4px; transition: background 0.15s; line-height: 1;
    }
    .doc-action-btn:hover   { background: #e3e8ef; }
    .doc-action-btn.delete  { color: #c62828; }
    .doc-action-btn.restore { color: #2e7d32; }
    .doc-expiry-tag        { font-size: 11px; color: #999; white-space: nowrap; }
    .doc-expiry-tag.urgent { color: #c62828; font-weight: 700; }
    .doc-modal {
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.55);
      display: grid; place-items: center; padding: 20px;
    }
    .doc-modal[hidden] { display: none; }
    .doc-modal-box {
      width: 100%; max-width: 560px;
      background: #fff; border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .doc-modal-large {
      max-width: 820px; max-height: 85vh;
      display: flex; flex-direction: column;
    }
    .doc-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 22px; border-bottom: 1px solid #ccd6e2; flex-shrink: 0;
    }
    .doc-modal-header h2     { margin: 0; font-size: 20px; }
    .doc-modal-header button { border: 0; background: transparent; font-size: 28px; cursor: pointer; color: #555; line-height: 1; }
    .doc-modal-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 22px; background: #f5f7fa;
      border-bottom: 1px solid #ccd6e2; font-size: 13px; color: #58677a; flex-shrink: 0;
    }
    .doc-modal-body { overflow-y: auto; flex: 1; }
    .doc-table-header {
      display: flex; align-items: center; gap: 14px;
      padding: 8px 20px; background: #eef1f5;
      border-bottom: 1px solid #ccd6e2;
      font-size: 12px; font-weight: 700; color: #444;
      position: sticky; top: 0; z-index: 1;
    }
    .doc-table-header .col-icon    { width: 46px; flex-shrink: 0; }
    .doc-table-header .col-name    { flex: 1; }
    .doc-table-header .col-cat     { width: 100px; flex-shrink: 0; }
    .doc-table-header .col-size    { width: 70px; flex-shrink: 0; text-align: right; }
    .doc-table-header .col-actions { width: 80px; flex-shrink: 0; }
    #docUploadForm               { padding: 22px; }
    #docUploadForm label         { display: block; margin-bottom: 18px; font-weight: 700; }
    #docUploadForm label span    { color: #c62828; }
    #docUploadForm input,
    #docUploadForm textarea,
    #docUploadForm select {
      display: block; width: 100%; margin-top: 8px;
      padding: 11px; border: 1px solid #cfd7e3;
      border-radius: 5px; font: inherit; box-sizing: border-box;
    }
    #docUploadForm textarea { min-height: 100px; resize: vertical; }
    #docUploadForm small    { display: block; margin-top: 7px; color: #657286; font-weight: 400; }
    .doc-modal-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      border-top: 1px solid #ccd6e2; padding-top: 18px;
    }
    .doc-btn         { border: 1px solid #b8c2d0; background: #fff; color: #0f1f33; padding: 10px 18px; border-radius: 5px; font-weight: 700; cursor: pointer; font-size: 13px; }
    .doc-btn.primary { background: #06264a; color: #fff; border-color: #06264a; }
    .doc-btn.primary:hover { background: #07345f; }
    .detail-box {
      width: 90% !important; max-width: 1200px !important; height: 80vh;
      display: flex; flex-direction: column;
      border: 1px solid #ccd6e2; border-radius: 8px;
      font-family: Arial, sans-serif; overflow: hidden;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    .detail-header {
      background-color: #f8fafc; padding: 20px 24px;
      font-weight: bold; font-size: 16px; color: #06264a;
      border-bottom: 1px solid #ccd6e2;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .detail-close-btn { background: transparent; border: none; font-size: 32px; cursor: pointer; color: #64748b; line-height: 1; }
    .detail-close-btn:hover { color: #0f172a; }
    .detail-body {
      padding: 30px; color: #333; line-height: 1.6;
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    }
    .detail-meta-group {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 20px; background: #f1f5f9; padding: 16px 20px; border-radius: 6px;
    }
    .detail-meta-group p { margin: 0; font-size: 15px; color: #1e293b; }
    .detail-desc-box {
      background-color: #fff; padding: 20px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 15px; color: #334155; flex: 1;
      overflow-y: auto; word-break: break-word; white-space: pre-wrap;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .detail-footer {
      background-color: #f8fafc; padding: 20px;
      text-align: center; border-top: 1px solid #ccd6e2; flex-shrink: 0;
    }
    .detail-btn-open {
      display: inline-block; padding: 14px 48px;
      background-color: #06264a; color: white; border: none;
      font-weight: bold; font-size: 15px; cursor: pointer;
      border-radius: 5px; transition: background 0.2s;
    }
    .detail-btn-open:hover { background-color: #07345f; }
    .dv-modal {
      position: fixed; inset: 0; z-index: 999999;
      background: #000; display: flex; padding: 0; margin: 0;
    }
    .dv-modal[hidden] { display: none; }
    .dv-box { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: #2b2b2b; overflow: hidden; }
    .dv-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #1a1a1a; color: #fff;
      flex-shrink: 0; height: 48px; gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4); z-index: 2;
    }
    .dv-header h2 {
      margin: 0; font-size: 15px; font-family: Arial, Helvetica, sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; color: #eee; font-weight: 400;
    }
    .dv-header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .dv-btn-download {
      background: #06264a; color: #fff; border: none; border-radius: 5px;
      padding: 6px 14px; font-weight: 700; font-size: 12px; cursor: pointer;
      font-family: Arial, Helvetica, sans-serif; transition: background 0.15s;
    }
    .dv-btn-download:hover { background: #0a3a6e; }
    .dv-btn-close {
      background: transparent; border: none; color: #ccc;
      font-size: 28px; line-height: 1; cursor: pointer; padding: 0 6px; transition: color 0.15s;
    }
    .dv-btn-close:hover { color: #fff; }
    .dv-body {
      flex: 1; overflow: hidden; display: flex;
      align-items: center; justify-content: center;
      background: #404040; position: relative;
    }
    .dv-body iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }
    .dv-body img    { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .dv-body pre {
      position: absolute; inset: 0; white-space: pre-wrap; word-break: break-word;
      padding: 40px; font-family: 'Courier New', monospace; font-size: 14px;
      line-height: 1.7; color: #f0f0f0; background: #1e1e1e;
      margin: 0; overflow: auto; box-sizing: border-box;
    }
    .dv-no-preview {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 60px 24px; text-align: center;
      font-family: Arial, Helvetica, sans-serif; color: #aaa; width: 100%;
    }
    .dv-no-preview .dv-no-icon { font-size: 72px; }
    .dv-no-preview strong { font-size: 20px; color: #eee; }
    .dv-no-preview p { margin: 0; font-size: 14px; color: #888; }
    .dv-no-preview .dv-np-btn {
      background: #06264a; color: #fff; border: none; border-radius: 6px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: Arial, Helvetica, sans-serif; margin-top: 8px; transition: background 0.15s;
    }
    .dv-no-preview .dv-np-btn:hover { background: #0a3a6e; }
    @media (max-width: 900px) {
      .doc-dashboard     { grid-template-columns: 1fr; }
      .doc-category-grid { grid-template-columns: 1fr; }
      .detail-meta-group { grid-template-columns: 1fr; gap: 8px; }
    }
    @media (max-width: 600px) {
      .dv-header { padding: 8px 10px; height: 44px; }
      .dv-header h2 { font-size: 13px; }
      .dv-btn-download { padding: 5px 10px; font-size: 11px; }
      .detail-box { height: 95vh; width: 95% !important; }
    }
  </style>
</head>
<body>

<script>
/* =====================================================================
   ██████╗  ██████╗  ███╗   ██╗ ███████╗ ██╗  ██████╗
   ██╔════╝ ██╔═══██╗████╗  ██║ ██╔════╝ ██║ ██╔════╝
   ██║      ██║   ██║██╔██╗ ██║ █████╗   ██║ ██║  ███╗
   ██║      ██║   ██║██║╚██╗██║ ██╔══╝   ██║ ██║   ██║
   ╚██████╗ ╚██████╔╝██║ ╚████║ ██║      ██║ ╚██████╔╝
    ╚═════╝  ╚═════╝ ╚═╝  ╚═══╝ ╚═╝      ╚═╝  ╚═════╝

   SÓ PRECISAS DE ALTERAR ESTA SECÇÃO!
   ===================================================================== */

window.DASHBOARD_CONFIG = {

  /* ------------------------------------------------------------------
     1. IDENTIFICADOR ÚNICO desta página (sem espaços, sem acentos)
        Cada página DEVE ter um ID diferente para os dados não se misturarem!
     ------------------------------------------------------------------ */
  id: "RH",          // Ex: "guias", "rh", "financeiro", "ti"

  /* ------------------------------------------------------------------
     2. TEXTOS DA PÁGINA
     ------------------------------------------------------------------ */
  tituloMes:       "RH adicionados este mês",
  tituloEliminados:"RH eliminados",
  tituloRecentes:  "Documentos recentes",
  tituloAdicionar: "Adicionar documento RH",
  subtituloAdicionar: "Clique para adicionar um novo documento de RH.",
  tituloModalNovo: "Novo Documento",
  labelFicheiro:   "Documento",
  detalheHeader:   "📄 DOCUMENTO",
  btnAbrir:        "📂 ABRIR O FICHEIRO",

  /* ------------------------------------------------------------------
     3. CATEGORIAS — podes ter 2 ou 3 categorias
        Cada categoria tem: id (sem espaços), nome, icone (emoji)
     ------------------------------------------------------------------ */
  categorias: [
    { id: "documentos",  nome: "Contratos",  icone: "📝" },
    { id: "formularios", nome: "Formações",  icone: "🎓" },
    { id: "outros",      nome: "Outros",       icone: "📦" },
  ],

};

/* =====================================================================
   FIM DA CONFIGURAÇÃO — não alteres nada abaixo desta linha
   ===================================================================== */
</script>

<!-- HTML gerado dinamicamente pelo script -->
<div id="app"></div>

<!-- Modais -->
<div class="doc-modal" id="docModal" hidden>
  <div class="doc-modal-box">
    <div class="doc-modal-header">
      <h2 id="modalNovo"></h2>
      <button type="button" id="closeDocModal">×</button>
    </div>
    <form id="docUploadForm">
      <label>Título <span style="color:#c62828">*</span>
        <input type="text" id="docTitle" placeholder="Digite o título" required>
      </label>
      <label>Autor <span style="color:#c62828">*</span>
        <input type="text" id="docAuthor" placeholder="Digite o nome do autor" required>
      </label>
      <label>Descrição (Máx. 350 caracteres) <span style="color:#c62828">*</span>
        <textarea id="docDescription" placeholder="Digite a descrição" maxlength="350" required></textarea>
      </label>
      <label>Categoria <span style="color:#c62828">*</span>
        <select id="docCategory" required></select>
      </label>
      <label id="labelFicheiro">Ficheiro <span style="color:#c62828">*</span>
        <input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.webp,.txt" required>
        <small>Formatos aceites: PDF, DOC, DOCX, XLS, XLSX, imagens e TXT</small>
      </label>
      <div class="doc-modal-actions">
        <button type="button" class="doc-btn" id="cancelDocModal">Cancelar</button>
        <button type="submit" class="doc-btn primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div class="doc-modal" id="categoryModal" hidden>
  <div class="doc-modal-box doc-modal-large">
    <div class="doc-modal-header">
      <h2 id="categoryModalTitle"></h2>
      <button type="button" id="closeCategoryModal">×</button>
    </div>
    <div class="doc-modal-toolbar">
      <span id="categoryModalCount"></span>
    </div>
    <div class="doc-modal-body" id="categoryDocumentsList"></div>
  </div>
</div>

<div class="doc-modal" id="detailsModal" hidden>
  <div class="doc-modal-box detail-box">
    <div class="detail-header">
      <span id="detalheHeaderSpan"></span>
      <button type="button" id="closeDetailsModal" class="detail-close-btn">×</button>
    </div>
    <div class="detail-body">
      <div class="detail-meta-group">
        <p>👤 <strong>Autor:</strong> <span id="detAuthor"></span></p>
        <p>📅 <strong>Adicionado em:</strong> <span id="detDate"></span></p>
      </div>
      <p>📝 <strong>Descrição:</strong></p>
      <div class="detail-desc-box" id="detDescription"></div>
    </div>
    <div class="detail-footer">
      <button type="button" id="detOpenFileInput" class="detail-btn-open"></button>
    </div>
  </div>
</div>

<div class="dv-modal" id="viewerModal" hidden>
  <div class="dv-box">
    <div class="dv-header">
      <h2 id="viewerModalTitle"></h2>
      <div class="dv-header-actions">
        <button type="button" class="dv-btn-download" id="viewerDownloadBtn">⬇ Descarregar</button>
        <button type="button" class="dv-btn-close" id="closeViewerModal">×</button>
      </div>
    </div>
    <div class="dv-body" id="viewerModalBody"></div>
  </div>
</div>

<script>
(function () {
  const C = window.DASHBOARD_CONFIG;

  /* ── Chaves de armazenamento únicas por página ── */
  const STORAGE_KEY       = `tb_${C.id}`;
  const FILES_KEY         = `tb_${C.id}_f`;
  const DELETED_KEY       = `tb_${C.id}_del`;
  const DELETED_FILES_KEY = `tb_${C.id}_delf`;
  const EXPIRY_DAYS       = 7;
  const DB_NAME           = `tb_${C.id}_db`;
  const DB_STORE          = "ficheiros";

  /* ── Referências DOM ── */
  const modal             = document.getElementById("docModal");
  const form              = document.getElementById("docUploadForm");
  const categoryModal     = document.getElementById("categoryModal");
  const categoryModalTitle= document.getElementById("categoryModalTitle");
  const categoryModalCount= document.getElementById("categoryModalCount");
  const categoryDocsList  = document.getElementById("categoryDocumentsList");
  const detailsModal      = document.getElementById("detailsModal");
  const detAuthor         = document.getElementById("detAuthor");
  const detDate           = document.getElementById("detDate");
  const detDescription    = document.getElementById("detDescription");
  const detOpenFileInput  = document.getElementById("detOpenFileInput");
  const viewerModal       = document.getElementById("viewerModal");
  const viewerTitle       = document.getElementById("viewerModalTitle");
  const viewerBody        = document.getElementById("viewerModalBody");
  const viewerDownloadBtn = document.getElementById("viewerDownloadBtn");

  let _selectedDoc = null;
  let _objectUrl   = null;
  let _currentDoc  = null;
  let _dbPromise   = null;

  /* ── Aplica textos da config ── */
  function applyConfig() {
    document.title = C.tituloAdicionar;

    // Textos estáticos nos modais
    document.getElementById("modalNovo").textContent       = C.tituloModalNovo;
    document.getElementById("detalheHeaderSpan").textContent = C.detalheHeader;
    document.getElementById("detOpenFileInput").textContent  = C.btnAbrir;
    document.getElementById("labelFicheiro").childNodes[0].textContent = C.labelFicheiro + " ";

    // Dropdown de categorias
    const sel = document.getElementById("docCategory");
    sel.innerHTML = "";
    C.categorias.forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat.id;
      opt.textContent = cat.nome;
      sel.appendChild(opt);
    });

    // Gera o HTML principal
    const app = document.getElementById("app");
    app.innerHTML = `
      <div class="doc-dashboard">
        <section class="doc-panel">
          <h2>${C.tituloMes}</h2>
          <div id="monthDocuments"><p class="doc-empty">Ainda não foram adicionados itens este mês.</p></div>
        </section>

        <button type="button" class="doc-add-card" id="openDocModal">
          <span>+</span>
          <strong>${C.tituloAdicionar}</strong>
          <p>${C.subtituloAdicionar}</p>
        </button>

        <section class="doc-panel">
          <h2>${C.tituloEliminados}</h2>
          <div id="deletedDocuments"><p class="doc-empty">Nenhum item eliminado.</p></div>
        </section>

        <section class="doc-panel">
          <h2>${C.tituloRecentes}</h2>
          <div id="recentDocuments"><p class="doc-empty">Ainda não há itens carregados.</p></div>
        </section>

        <section class="doc-panel doc-categories-panel">
          <h2>Categorias</h2>
          <div class="doc-category-grid">
            ${C.categorias.map(cat => `
              <div class="doc-category-card" data-category="${cat.id}">
                <span>${cat.icone}</span>
                <strong>${cat.nome}</strong>
                <small><b id="count_${cat.id}">0</b> documentos</small>
              </div>
            `).join("")}
          </div>
        </section>
      </div>`;

    // Eventos após gerar HTML
    document.getElementById("openDocModal").addEventListener("click", () => { modal.hidden = false; });
    document.querySelectorAll(".doc-category-card").forEach(card =>
      card.addEventListener("click", () => openCategoryModal(card.dataset.category))
    );
  }

  /* ── Storage helpers ── */
  function safeJson(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; }
  }
  const getDocs        = () => safeJson(STORAGE_KEY, []);
  const getFiles       = () => safeJson(FILES_KEY, {});
  const getDeleted     = () => safeJson(DELETED_KEY, []);
  const getDeletedFiles= () => safeJson(DELETED_FILES_KEY, {});
  const save           = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  /* ── IndexedDB ── */
  function openDb() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise((resolve, reject) => {
      if (!window.indexedDB) { reject(new Error("IndexedDB nao suportado.")); return; }
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        if (!req.result.objectStoreNames.contains(DB_STORE))
          req.result.createObjectStore(DB_STORE, { keyPath: "id" });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
    return _dbPromise;
  }
  async function withStore(mode, action) {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, mode);
      const req = action(tx.objectStore(DB_STORE));
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error || tx.error);
      tx.onerror    = () => reject(tx.error);
    });
  }
  const putFile    = (id, data) => withStore("readwrite", s => s.put({ id: String(id), data }));
  const getFile    = id         => withStore("readonly",  s => s.get(String(id)));
  const delFile    = id         => withStore("readwrite", s => s.delete(String(id)));

  async function getFileData(doc) {
    const stored = await getFile(doc.id).catch(() => null);
    if (stored?.data) return stored.data;
    return getFiles()[doc.id] || getDeletedFiles()[doc.id] || null;
  }

  /* ── Utilitários ── */
  function readAsDataURL(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = () => rej(r.error);
      r.readAsDataURL(file);
    });
  }
  const esc = str => String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const getExt = f => f.slice(((f.lastIndexOf(".")-1)>>>0)+2) || "fic";
  function fmtSize(b) {
    if (!b) return "0 Bytes";
    const k=1024, s=["Bytes","KB","MB","GB"], i=Math.min(Math.floor(Math.log(b)/Math.log(k)),s.length-1);
    return parseFloat((b/Math.pow(k,i)).toFixed(1))+" "+s[i];
  }
  function getCatName(id) {
    return C.categorias.find(c => c.id === id)?.nome || id;
  }
  function getDaysLeft(str) {
    if (!str) return EXPIRY_DAYS;
    const d = Math.ceil((new Date(str).getTime()+(EXPIRY_DAYS*86400000)-Date.now())/86400000);
    return d<0?0:d;
  }
  function b64ToBlob(b64, type="", size=512) {
    const bytes = atob((b64.split(",")[1]||b64)), arrs = [];
    for (let o=0;o<bytes.length;o+=size) {
      const sl=bytes.slice(o,o+size), arr=new Uint8Array(sl.length);
      for (let i=0;i<sl.length;i++) arr[i]=sl.charCodeAt(i);
      arrs.push(arr);
    }
    return new Blob(arrs,{type});
  }

  /* ── Eventos fixos ── */
  document.getElementById("closeDocModal").addEventListener("click",   () => { modal.hidden=true; form.reset(); });
  document.getElementById("cancelDocModal").addEventListener("click",  () => { modal.hidden=true; form.reset(); });
  document.getElementById("closeCategoryModal").addEventListener("click", () => { categoryModal.hidden=true; });
  document.getElementById("closeDetailsModal").addEventListener("click",  () => { detailsModal.hidden=true; });
  document.getElementById("closeViewerModal").addEventListener("click",   closeViewer);
  viewerDownloadBtn.addEventListener("click", () => { if (_currentDoc) downloadDoc(_currentDoc); });
  detOpenFileInput.addEventListener("click",  () => { if (_selectedDoc) { detailsModal.hidden=true; openDoc(_selectedDoc); } });
  categoryModal.addEventListener("click",  e => { if (e.target===categoryModal)  categoryModal.hidden=true; });
  detailsModal.addEventListener("click",   e => { if (e.target===detailsModal)   detailsModal.hidden=true; });
  document.addEventListener("keydown", e => {
    if (e.key==="Escape" && !viewerModal.hidden)  closeViewer();
    if (e.key==="Escape" && !detailsModal.hidden) detailsModal.hidden=true;
  });

  /* ── Guardar ficheiro ── */
  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const title       = document.getElementById("docTitle").value.trim();
    const author      = document.getElementById("docAuthor").value.trim();
    const description = document.getElementById("docDescription").value.trim();
    const category    = document.getElementById("docCategory").value;
    const file        = document.getElementById("docFile").files[0];
    if (!title||!author||!description||!category||!file) { alert("Preenche todos os campos e escolhe um ficheiro."); return; }
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled=true; btn.textContent="A guardar...";
    const id = String(Date.now());
    try {
      const data = await readAsDataURL(file);
      await putFile(id, data);
      const docs = getDocs();
      docs.unshift({ id, title, author, description, category,
        fileName: file.name, type: getExt(file.name),
        mimeType: file.type||"application/octet-stream",
        size: fmtSize(file.size), date: new Date().toISOString() });
      save(STORAGE_KEY, docs);
      modal.hidden=true; form.reset(); renderAll();
      alert("Item guardado com sucesso.");
    } catch(err) {
      await delFile(id).catch(()=>{});
      alert("Nao foi possivel guardar. Tenta um ficheiro mais pequeno.");
      console.error(err);
    } finally { btn.disabled=false; btn.textContent="Guardar"; }
  });

  /* ── Render ── */
  function renderAll() {
    const docs = getDocs();
    renderList(document.getElementById("recentDocuments"), docs.slice(0,3));
    renderList(document.getElementById("monthDocuments"),  docs.slice(0,5));
    renderDeletedList();
    C.categorias.forEach(cat => {
      const el = document.getElementById(`count_${cat.id}`);
      if (el) el.textContent = docs.filter(d=>d.category===cat.id).length;
    });
  }

  function renderList(container, docs) {
    container.innerHTML = "";
    if (!docs.length) { container.innerHTML='<p class="doc-empty">Ainda nao ha itens carregados.</p>'; return; }
    docs.forEach(d => container.appendChild(buildItem(d, false)));
  }

  function renderDeletedList() {
    const container = document.getElementById("deletedDocuments");
    container.innerHTML = "";
    const deleted = getDeleted();
    if (!deleted.length) { container.innerHTML='<p class="doc-empty">Nenhum item eliminado.</p>'; return; }
    deleted.forEach(d => container.appendChild(buildItem(d, true)));
  }

  function buildItem(doc, isDeleted) {
    const item = document.createElement("div");
    item.className = "doc-list-item";
    item.style.cursor = "pointer";
    const daysLeft   = isDeleted ? getDaysLeft(doc.deletedAt) : null;
    const urgentClass= isDeleted && daysLeft<=2 ? " urgent" : "";
    const iconBg     = isDeleted ? "background:#9e9e9e" : "";
    item.innerHTML = `
      <span class="doc-list-icon" style="${iconBg}">${esc(doc.type)}</span>
      <div class="doc-list-info">
        <strong>${esc(doc.title)}</strong>
        <small>${getCatName(doc.category)} - ${esc(doc.size)}</small>
      </div>
      ${isDeleted ? `<span class="doc-expiry-tag${urgentClass}">${daysLeft}d</span>` : ""}
      <div class="doc-list-actions">
        ${isDeleted
          ? `<button type="button" class="doc-action-btn restore" title="Restaurar">↩️</button>`
          : `<button type="button" class="doc-action-btn open-btn"     title="Ver detalhes">👁️</button>
             <button type="button" class="doc-action-btn download-btn" title="Descarregar">⬇️</button>
             <button type="button" class="doc-action-btn delete"       title="Eliminar">🗑️</button>`}
      </div>`;
    if (isDeleted) {
      item.querySelector(".restore").addEventListener("click", e=>{e.stopPropagation();restoreDoc(doc.id);});
    } else {
      item.querySelector(".open-btn").addEventListener("click",     e=>{e.stopPropagation();showDetails(doc);});
      item.querySelector(".download-btn").addEventListener("click", e=>{e.stopPropagation();downloadDoc(doc);});
      item.querySelector(".delete").addEventListener("click",       e=>{e.stopPropagation();deleteDoc(doc.id);});
      item.addEventListener("click", ()=>showDetails(doc));
    }
    return item;
  }

  /* ── Modal de categoria ── */
  function openCategoryModal(category) {
    const docs = getDocs().filter(d=>d.category===category);
    categoryModalTitle.textContent = getCatName(category);
    categoryModalCount.textContent = `${docs.length} documento(s)`;
    categoryDocsList.innerHTML = "";
    const header = document.createElement("div");
    header.className = "doc-table-header";
    header.innerHTML = `<span class="col-icon"></span><span class="col-name">Nome</span><span class="col-cat">Categoria</span><span class="col-size">Tamanho</span><span class="col-actions"></span>`;
    categoryDocsList.appendChild(header);
    if (!docs.length) {
      const p=document.createElement("p"); p.className="doc-empty"; p.textContent="Nenhum item nesta categoria.";
      categoryDocsList.appendChild(p);
    } else {
      docs.forEach(doc => {
        const item = buildItem(doc, false);
        // override delete para refrescar modal
        item.querySelector(".delete").addEventListener("click", e=>{e.stopPropagation();deleteDoc(doc.id);openCategoryModal(category);},{once:true});
        // adiciona colunas extras
        const cat  = item.querySelector(".doc-list-info");
        const catSpan  = document.createElement("span");
        catSpan.style.cssText="width:100px;flex-shrink:0;font-size:12px;color:#58677a";
        catSpan.textContent = getCatName(doc.category);
        const sizeSpan = document.createElement("span");
        sizeSpan.style.cssText="width:70px;flex-shrink:0;font-size:12px;color:#58677a;text-align:right";
        sizeSpan.textContent = doc.size;
        cat.after(catSpan); catSpan.after(sizeSpan);
        categoryDocsList.appendChild(item);
      });
    }
    categoryModal.hidden = false;
  }

  /* ── Detalhes ── */
  function showDetails(doc) {
    _selectedDoc = doc;
    detAuthor.textContent = doc.author||"Desconhecido";
    const d = new Date(doc.date);
    detDate.textContent = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()} às ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    detDescription.textContent = (doc.description||"").substring(0,350);
    detailsModal.hidden = false;
  }

  /* ── Viewer ── */
  async function openDoc(doc) {
    const data = await getFileData(doc);
    if (!data) { alert("Ficheiro nao encontrado."); return; }
    _currentDoc = doc;
    viewerTitle.textContent = doc.title||doc.fileName;
    viewerBody.innerHTML = "";
    if (_objectUrl) { URL.revokeObjectURL(_objectUrl); _objectUrl=null; }
    const mime = doc.mimeType||"";
    if (mime==="application/pdf") {
      const blob=b64ToBlob(data,mime); _objectUrl=URL.createObjectURL(blob);
      const iframe=document.createElement("iframe"); iframe.src=_objectUrl; viewerBody.appendChild(iframe);
    } else if (mime.startsWith("image/")) {
      const img=document.createElement("img"); img.src=data; img.alt=doc.title; viewerBody.appendChild(img);
    } else if (mime.startsWith("text/")||mime==="application/json") {
      try {
        const pre=document.createElement("pre"); pre.textContent=await b64ToBlob(data,mime).text(); viewerBody.appendChild(pre);
      } catch { showNoPreview(doc); }
    } else { showNoPreview(doc); }
    viewerModal.hidden = false;
  }
  function showNoPreview(doc) {
    const div=document.createElement("div"); div.className="dv-no-preview";
    div.innerHTML=`<span class="dv-no-icon">📄</span><strong>${esc(doc.fileName)}</strong><p>Sem pré-visualização disponível para este formato.</p><button type="button" class="dv-np-btn">Descarregar ficheiro</button>`;
    div.querySelector(".dv-np-btn").addEventListener("click",()=>downloadDoc(doc));
    viewerBody.appendChild(div);
  }
  function closeViewer() {
    viewerModal.hidden=true; viewerBody.innerHTML="";
    if (_objectUrl) { URL.revokeObjectURL(_objectUrl); _objectUrl=null; }
    _currentDoc=null;
  }

  /* ── Download / Delete / Restore ── */
  async function downloadDoc(doc) {
    const data=await getFileData(doc);
    if (!data) { alert("Ficheiro nao encontrado."); return; }
    const a=document.createElement("a"); a.href=data; a.download=doc.fileName||"ficheiro";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  async function deleteDoc(id) {
    const docs=getDocs(), idx=docs.findIndex(d=>String(d.id)===String(id));
    if (idx===-1) return;
    const [doc]=docs.splice(idx,1); doc.deletedAt=new Date().toISOString();
    const del=getDeleted(); del.unshift(doc);
    const lf=getFiles(), ldf=getDeletedFiles();
    if (lf[id]) { ldf[id]=lf[id]; delete lf[id]; save(FILES_KEY,lf); save(DELETED_FILES_KEY,ldf); }
    save(STORAGE_KEY,docs); save(DELETED_KEY,del); renderAll();
  }
  function restoreDoc(id) {
    const del=getDeleted(), idx=del.findIndex(d=>String(d.id)===String(id));
    if (idx===-1) return;
    const [doc]=del.splice(idx,1); delete doc.deletedAt;
    const docs=getDocs(); docs.unshift(doc);
    const lf=getFiles(), ldf=getDeletedFiles();
    if (ldf[id]) { lf[id]=ldf[id]; delete ldf[id]; save(FILES_KEY,lf); save(DELETED_FILES_KEY,ldf); }
    save(STORAGE_KEY,docs); save(DELETED_KEY,del); renderAll();
  }

  /* ── Expiração ── */
  async function purgeExpired() {
    const del=getDeleted(), now=Date.now(), valid=[], expired=[];
    del.forEach(d => (new Date(d.deletedAt).getTime()+(EXPIRY_DAYS*86400000)>now ? valid : expired).push(d));
    const ldf=getDeletedFiles();
    expired.forEach(d=>{ delete ldf[d.id]; delFile(d.id).catch(()=>{}); });
    save(DELETED_KEY,valid); save(DELETED_FILES_KEY,ldf);
  }

  /* ── Migração legacy ── */
  async function migrateLegacy() {
    const entries=[...Object.entries(getFiles()),...Object.entries(getDeletedFiles())];
    for (const [id,data] of entries) {
      const ex=await getFile(id).catch(()=>null);
      if (!ex&&data) await putFile(id,data).catch(()=>{});
    }
  }

  /* ── Init ── */
  async function init() {
    applyConfig();
    await openDb().catch(e=>console.error(e));
    await migrateLegacy();
    await purgeExpired();
    renderAll();
  }

  init();
})();
</script>
</body>

<script>
(function() {

  if (document.getElementById('appearance-panel')) return;

  document.body.insertAdjacentHTML('beforeend', `
  <div id="appearance-panel">
    <div class="ap-header">
      <span>Aparência</span>
      <button id="btn-toggle">ocultar</button>
    </div>

    <div class="ap-body" id="ap-body">

      <p>Texto</p>
      <label><input type="radio" name="ap_size" value="small"> Pequeno</label>
      <label><input type="radio" name="ap_size" value="standard" checked> Padrão</label>
      <label><input type="radio" name="ap_size" value="large"> Grande</label>

      <p>Cor</p>
      <label><input type="radio" name="ap_color" value="light" checked> Claro</label>
      <label><input type="radio" name="ap_color" value="dark"> Escuro</label>

    </div>
  </div>
  `);

  const css = document.createElement('style');
  css.innerHTML = `
  #appearance-panel{
      position:fixed;
      right:0;
      top:50%;
      transform:translateY(-50%);
      z-index:99999;
      background:#fff;
      border:1px solid #ccc;
      border-right:none;
      padding:15px;
      min-width:160px;
      border-radius:8px 0 0 8px;
      box-shadow:-3px 0 10px rgba(0,0,0,.15);
  }

  .ap-header{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
      font-weight:bold;
  }

  .ap-body p{
      margin:10px 0 5px;
      font-weight:bold;
  }

  .ap-body label{
      display:block;
      margin-bottom:4px;
  }

  body.tb-dark{
      background:#1a1a1a !important;
      color:#e8e8e8 !important;
  }

  body.tb-dark #content,
  body.tb-dark .mw-body,
  body.tb-dark .wiki-box,
  body.tb-dark .wiki-hero{
      background:#2d2d2d !important;
      color:#e8e8e8 !important;
  }

  body.tb-small{font-size:13px;}
  body.tb-standard{font-size:15px;}
  body.tb-large{font-size:18px;}
  `;
  document.head.appendChild(css);

  function save(k,v){
      localStorage.setItem('tb_'+k,v);
  }

  function load(k){
      return localStorage.getItem('tb_'+k);
  }

  function applyTheme(v){
      document.body.classList.remove('tb-dark');
      if(v==='dark'){
          document.body.classList.add('tb-dark');
      }
  }

  function applySize(v){
      document.body.classList.remove('tb-small','tb-standard','tb-large');
      document.body.classList.add('tb-'+v);
  }

  document.querySelectorAll('input[name="ap_color"]').forEach(el=>{
      el.addEventListener('change',function(){
          applyTheme(this.value);
          save('theme',this.value);
      });
  });

  document.querySelectorAll('input[name="ap_size"]').forEach(el=>{
      el.addEventListener('change',function(){
          applySize(this.value);
          save('size',this.value);
      });
  });

  const theme = load('theme') || 'light';
  const size  = load('size') || 'standard';

  applyTheme(theme);
  applySize(size);

  const t = document.querySelector('[name="ap_color"][value="'+theme+'"]');
  if(t) t.checked = true;

  const s = document.querySelector('[name="ap_size"][value="'+size+'"]');
  if(s) s.checked = true;

  document.getElementById('btn-toggle').onclick = function(){
      const body = document.getElementById('ap-body');
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
  };

})();
</script>
